name: Nightly Token Audit

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  token-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run strict token audit
        run: node scripts/audit-hardcoded-tokens.cjs --ci --json-out docs/audits/token-audit-nightly.json --md-out docs/audits/token-audit-nightly.md
